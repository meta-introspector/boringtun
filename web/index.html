<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>kagenti WireGuard tunnel</title>
<style>
body{font-family:system-ui;background:#0d1117;color:#c9d1d9;max-width:700px;margin:2rem auto;padding:0 1rem}
h1{color:#58a6ff}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;margin:1rem 0}
input,button{padding:.5rem;margin:.25rem 0;border-radius:4px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:.9rem;font-family:monospace}
button{background:#238636;border:none;color:#fff;cursor:pointer;font-weight:600;padding:.5rem 1.5rem}
button:hover{background:#2ea043}
button:disabled{opacity:.5;cursor:default}
#log{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:1rem;height:300px;overflow-y:auto;font-family:monospace;font-size:.8rem;white-space:pre-wrap}
.ok{color:#3fb950}.err{color:#f85149}.info{color:#58a6ff}
label{color:#8b949e;font-size:.85rem;display:block;margin-top:.5rem}
</style>
</head><body>
<h1>kagenti WireGuard tunnel</h1>
<p>Browser-based WireGuard via boringtun WASM + Wasmer SDK + WebSocket relay</p>

<div class="card">
<label>Private Key (base64)</label>
<input id="privkey" style="width:100%" placeholder="paste your WG private key">
<label>Server Public Key (base64)</label>
<input id="pubkey" style="width:100%" value="ad1Pj+qvyjoJr2DJ8/zTcNvuve2+QtBDT1dZs2EUvgs=">
<label>Relay WebSocket URL</label>
<input id="relay" style="width:100%" value="ws://192.168.68.62:9719">
<br><br>
<button id="btn" onclick="connect()">Connect</button>
<button onclick="disconnect()" id="dc" disabled>Disconnect</button>
</div>

<div class="card"><div id="log"></div></div>

<script type="module">
import { init, Wasmer } from "https://unpkg.com/@wasmer/sdk@latest/dist/index.mjs";

const logEl = document.getElementById('log');
function msg(text, cls='info') {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = new Date().toISOString().slice(11,19) + ' ' + text + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

let ws = null, wasm = null, mem = null, tickId = null;

// Ring crypto C primitives — provided as JS imports for the WASM module.
// These are the low-level functions ring expects linked from its C/asm code.
function ringEnv(memory) {
  return {
    // Constant-time memcmp: returns 0 if equal
    ring_core_0_17_14__CRYPTO_memcmp(a, b, len) {
      const buf = new Uint8Array(memory.buffer);
      let diff = 0;
      for (let i = 0; i < len; i++) diff |= buf[a+i] ^ buf[b+i];
      return diff === 0 ? 0 : -1;
    },
    // Poly1305 stubs — ring's WASM build needs these but they're called
    // through the Rust wrappers which handle the actual crypto.
    // These are placeholders; real impl would need full poly1305.
    ring_core_0_17_14__CRYPTO_poly1305_init(ctx, key) {},
    ring_core_0_17_14__CRYPTO_poly1305_update(ctx, inp, len) {},
    ring_core_0_17_14__CRYPTO_poly1305_finish(ctx, mac) {},
    ring_core_0_17_14__limbs_mul_add_limb(r, a, b, n) { return 0; },
    ring_core_0_17_14__bn_from_montgomery_in_place(r, num_limbs, n, n0, tmp) {},
  };
}

// Minimal WASI stubs for wasm32-wasip1
function wasiPreview1(memory) {
  return {
    random_get(buf, len) {
      const arr = new Uint8Array(memory.buffer, buf, len);
      crypto.getRandomValues(arr);
      return 0;
    },
    environ_get() { return 0; },
    environ_sizes_get(count_ptr, size_ptr) {
      const view = new DataView(memory.buffer);
      view.setUint32(count_ptr, 0, true);
      view.setUint32(size_ptr, 0, true);
      return 0;
    },
    clock_time_get(id, precision, time_ptr) {
      const view = new DataView(memory.buffer);
      const ns = BigInt(Math.floor(performance.now() * 1e6));
      view.setBigUint64(time_ptr, ns, true);
      return 0;
    },
    fd_write(fd, iovs, iovs_len, nwritten_ptr) {
      const view = new DataView(memory.buffer);
      let written = 0;
      for (let i = 0; i < iovs_len; i++) {
        const ptr = view.getUint32(iovs + i*8, true);
        const len = view.getUint32(iovs + i*8 + 4, true);
        const bytes = new Uint8Array(memory.buffer, ptr, len);
        const text = new TextDecoder().decode(bytes);
        if (fd === 1) msg('stdout: ' + text);
        else if (fd === 2) msg('stderr: ' + text, 'err');
        written += len;
      }
      view.setUint32(nwritten_ptr, written, true);
      return 0;
    },
    proc_exit(code) { msg('proc_exit(' + code + ')', 'err'); },
    sched_yield() { return 0; },
  };
}

async function loadWasm() {
  msg('loading boringtun_wasm.wasm...');
  const resp = await fetch('boringtun_wasm.wasm');
  const bytes = await resp.arrayBuffer();
  const module = await WebAssembly.compile(bytes);

  // Create memory, then build imports that reference it
  const memory = new WebAssembly.Memory({ initial: 256, maximum: 1024 });
  const instance = await WebAssembly.instantiate(module, {
    env: { memory, ...ringEnv(memory) },
    wasi_snapshot_preview1: wasiPreview1(memory),
  });

  // Use the module's own memory if it exports one
  const exportedMem = instance.exports.memory || memory;
  return { exports: instance.exports, memory: exportedMem };
}

window.connect = async function() {
  const privB64 = document.getElementById('privkey').value.trim();
  const pubB64 = document.getElementById('pubkey').value.trim();
  const relayUrl = document.getElementById('relay').value.trim();
  if (!privB64 || !pubB64) { msg('need both keys', 'err'); return; }

  try {
    const w = await loadWasm();
    wasm = w.exports; mem = w.memory;
    msg('wasm loaded', 'ok');
  } catch(e) {
    msg('wasm load failed: ' + e, 'err');
    return;
  }

  const privRaw = Uint8Array.from(atob(privB64), c => c.charCodeAt(0));
  const pubRaw = Uint8Array.from(atob(pubB64), c => c.charCodeAt(0));

  const privPtr = wasm.wg_alloc(32), pubPtr = wasm.wg_alloc(32);
  new Uint8Array(mem.buffer, privPtr, 32).set(privRaw);
  new Uint8Array(mem.buffer, pubPtr, 32).set(pubRaw);

  const rc = wasm.wg_init(privPtr, pubPtr, 0, 25, 1);
  wasm.wg_free(privPtr, 32); wasm.wg_free(pubPtr, 32);
  if (rc !== 0) { msg('wg_init failed: ' + rc, 'err'); return; }
  msg('tunnel initialized', 'ok');

  msg('connecting to relay ' + relayUrl + '...');
  ws = new WebSocket(relayUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    msg('relay connected', 'ok');
    document.getElementById('btn').disabled = true;
    document.getElementById('dc').disabled = false;
    sendTick();
    tickId = setInterval(sendTick, 5000);
  };

  ws.onmessage = (ev) => {
    const data = new Uint8Array(ev.data);
    const srcPtr = wasm.wg_alloc(data.length);
    const dstPtr = wasm.wg_alloc(65536);
    const opPtr = wasm.wg_alloc(4);
    new Uint8Array(mem.buffer, srcPtr, data.length).set(data);

    const n = wasm.wg_read(srcPtr, data.length, dstPtr, 65536, opPtr);
    const op = new Int32Array(mem.buffer, opPtr, 1)[0];

    if (op === 1 && n > 0) {
      ws.send(new Uint8Array(mem.buffer, dstPtr, n).slice());
      msg('← handshake response (' + n + 'B)');
    } else if ((op === 4 || op === 6) && n > 0) {
      msg('← decrypted ' + (op===4?'IPv4':'IPv6') + ' (' + n + 'B)', 'ok');
    } else if (n < 0) {
      msg('← decrypt error', 'err');
    }

    wasm.wg_free(srcPtr, data.length);
    wasm.wg_free(dstPtr, 65536);
    wasm.wg_free(opPtr, 4);
  };

  ws.onclose = () => { msg('relay disconnected', 'err'); cleanup(); };
  ws.onerror = () => { msg('relay error', 'err'); };
};

function sendTick() {
  if (!wasm || !ws || ws.readyState !== 1) return;
  const dstPtr = wasm.wg_alloc(65536), opPtr = wasm.wg_alloc(4);
  const n = wasm.wg_tick(dstPtr, 65536, opPtr);
  const op = new Int32Array(mem.buffer, opPtr, 1)[0];
  if (op === 1 && n > 0) {
    ws.send(new Uint8Array(mem.buffer, dstPtr, n).slice());
    msg('→ handshake init (' + n + 'B)');
  }
  wasm.wg_free(dstPtr, 65536); wasm.wg_free(opPtr, 4);
}

function cleanup() {
  if (tickId) { clearInterval(tickId); tickId = null; }
  document.getElementById('btn').disabled = false;
  document.getElementById('dc').disabled = true;
}

window.disconnect = function() {
  if (ws) { ws.close(); ws = null; }
  cleanup();
  msg('disconnected');
};
</script>
</body></html>
