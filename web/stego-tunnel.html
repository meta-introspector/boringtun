<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>🐱 kagenti stego tunnel</title>
<style>
*{box-sizing:border-box}
body{font-family:monospace;background:#0a0a0a;color:#0f0;padding:1em;max-width:800px;margin:0 auto}
h1{color:#0ff;font-size:1.3em}

</head><body>
<h1>🐱 kagenti stego tunnel</h1>
<p style="color:#888">WireGuard tunnel hidden in cat memes. Paste this page into a pastebin to share.</p>

<h2>🔑 Keys</h2>
<div class="card">
<div class="row">
<input type="text" id="privkey" placeholder="your WG private key (base64)" style="width:100%">
</div>
<div class="row">
<input type="text" id="pubkey" placeholder="peer public key (base64)" style="width:100%">
</div>
<div class="row">
<button onclick="genKeys()">Generate Keypair</button>
<button onclick="initTunnel()">Init Tunnel</button>
</div>
<div id="my-pub" style="color:#ff0;font-size:.8em"></div>
</div>

<h2>🖼 Meme Stego</h2>
<div class="card">
<div class="row">
<input type="text" id="meme-top" placeholder="TOP TEXT" value="NOTHING TO SEE HERE" style="width:45%">
<input type="text" id="meme-bot" placeholder="BOTTOM TEXT" value="JUST A CAT" style="width:45%">
</div>
<div class="row">
<button onclick="doHandshake()">🤝 Handshake → Meme</button>
<button onclick="doSend()">📤 Send Data → Meme</button>
<button onclick="doReceive()">📥 Receive ← Image</button>
<button onclick="doDownload()">⬇ Download</button>
</div>
<div style="display:flex;gap:.5em;align-items:start;flex-wrap:wrap">
<div>
<div style="color:#888;font-size:.8em">carrier / output</div>
<canvas id="canvas" width="256" height="256"></canvas>
</div>
<div>
<div style="color:#888;font-size:.8em">cat source</div>
<img id="cat" src="https://placekitten.com/256/256" crossorigin="anonymous" width="256" height="256">
<button onclick="newCat()" style="display:block;margin-top:.2em">🐱 New Cat</button>
</div>
</div>
<div class="row">
<label style="color:#888;font-size:.8em">Load image: <input type="file" id="img-file" accept="image/*" onchange="loadImg(this)"></label>
</div>
</div>

<h2>📋 Paste Exchange</h2>
<div class="card">
<textarea id="paste-box" placeholder="Paste stego text here (zero-width encoded), or paste image data URL"></textarea>
<div class="row">
<button onclick="pasteToCanvas()">Load → Canvas</button>
<button onclick="canvasToPaste()">Canvas → Clipboard</button>
<button onclick="postToPastebin()">📮 Post to Pastebin</button>
</div>
<input type="text" id="paste-url" placeholder="pastebin URL (e.g. http://localhost:8080/paste)" value="" style="margin-top:.3em">
</div>

<h2>📡 Log</h2>
<div id="log"></div>

<script type="module">
const $ = id => document.getElementById(id);
const logEl = $('log');
function msg(t, cls='info') {
  const s = document.createElement('span');
  s.className = cls;
  s.textContent = new Date().toISOString().slice(11,19) + ' ' + t + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

// === Zero-width stego (text mode) ===
function zwEncode(data) {
  const b64 = btoa(String.fromCharCode(...data));
  const cover = ['the','quick','brown','fox','jumps','over','a','lazy','dog',
    'and','then','runs','back','to','its','den','in','woods'];
  let out = '';
  for (let i = 0; i < b64.length; i++) {
    const byte = b64.charCodeAt(i);
    out += cover[i % cover.length] + '\u200B';
    for (let bit = 7; bit >= 0; bit--)
      out += (byte >> bit) & 1 ? '\u200C' : '\u200D';
    out += ' ';
  }
  return out + '\n---\n';
}

function zwDecode(paste) {
  const chars = [];
  let inBits = false, byte = 0, bc = 0;
  for (const ch of paste) {
    if (ch === '\u200B') { inBits = true; byte = 0; bc = 0; }
    else if (ch === '\u200C' && inBits) { byte = (byte << 1) | 1; bc++; }
    else if (ch === '\u200D' && inBits) { byte <<= 1; bc++; }
    else if ((ch === ' ' || ch === '\n') && inBits && bc === 8) {
      chars.push(byte); inBits = false;
    } else { inBits = false; }
  }
  const b64 = String.fromCharCode(...chars);
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

// === Image stego (DCT+QIM, simplified from erdfa-clean) ===
function dct8(x) {
  const out = new Float32Array(8);
  for (let k = 0; k < 8; k++) {
    const s = k === 0 ? Math.SQRT1_2 : 1;
    let sum = 0;
    for (let n = 0; n < 8; n++)
      sum += x[n] * Math.cos(Math.PI * (2*n+1) * k / 16);
    out[k] = sum * s * 0.5;
  }
  return out;
}
function idct8(x) {
  const out = new Float32Array(8);
  for (let n = 0; n < 8; n++) {
    let sum = 0;
    for (let k = 0; k < 8; k++) {
      const s = k === 0 ? Math.SQRT1_2 : 1;
      sum += s * x[k] * Math.cos(Math.PI * (2*n+1) * k / 16);
    }
    out[n] = sum * 0.5;
  }
  return out;
}
const EPOS = [[1,2],[2,1],[2,2],[3,1]];
const STEP = 20;

function imgStegoEncode(data, pixels, w, h) {
  // frame: [len:2][payload][crc:0 for now]
  const framed = new Uint8Array(2 + data.length);
  framed[0] = (data.length >> 8) & 0xff;
  framed[1] = data.length & 0xff;
  framed.set(data, 2);
  // to bits
  const bits = [];
  for (const b of framed) for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);

  const luma = new Float32Array(w * h);
  for (let i = 0; i < w*h; i++)
    luma[i] = 0.299*pixels[i*4] + 0.587*pixels[i*4+1] + 0.114*pixels[i*4+2];

  const bx = Math.floor(w/8), by = Math.floor(h/8);
  let bi = 0;
  for (let blky = 0; blky < by && bi < bits.length; blky++) {
    for (let blkx = 0; blkx < bx && bi < bits.length; blkx++) {
      // extract 8x8 block
      const block = Array.from({length:8}, (_,r) =>
        Float32Array.from({length:8}, (_,c) => luma[(blky*8+r)*w + blkx*8+c] - 128));
      // row DCT
      const tmp = block.map(row => dct8(row));
      // col DCT
      const dct = Array.from({length:8}, (_,r) => new Float32Array(8));
      for (let j = 0; j < 8; j++) {
        const col = new Float32Array(8);
        for (let i = 0; i < 8; i++) col[i] = tmp[i][j];
        const dc = dct8(col);
        for (let i = 0; i < 8; i++) dct[i][j] = dc[i];
      }
      // embed
      for (const [r,c] of EPOS) {
        if (bi >= bits.length) break;
        const q = Math.round(dct[r][c] / STEP);
        dct[r][c] = ((q & 1) === bits[bi]) ? q * STEP :
          (Math.abs((q+1)*STEP - dct[r][c]) < Math.abs((q-1)*STEP - dct[r][c]) ?
            (q+1)*STEP : (q-1)*STEP);
        bi++;
      }
      // inverse col DCT
      const tmp2 = Array.from({length:8}, (_,r) => new Float32Array(8));
      for (let j = 0; j < 8; j++) {
        const col = new Float32Array(8);
        for (let i = 0; i < 8; i++) col[i] = dct[i][j];
        const ic = idct8(col);
        for (let i = 0; i < 8; i++) tmp2[i][j] = ic[i];
      }
      // inverse row DCT
      for (let r = 0; r < 8; r++) {
        const row = idct8(tmp2[r]);
        for (let c = 0; c < 8; c++)
          luma[(blky*8+r)*w + blkx*8+c] = Math.max(0, Math.min(255, row[c] + 128));
      }
    }
  }
  // apply luma back to green channel
  const out = new Uint8Array(pixels);
  for (let i = 0; i < w*h; i++) {
    const oldY = 0.299*out[i*4] + 0.587*out[i*4+1] + 0.114*out[i*4+2];
    out[i*4+1] = Math.max(0, Math.min(255, Math.round(out[i*4+1] + (luma[i] - oldY) / 0.587)));
  }
  return out;
}

function imgStegoDecode(pixels, w, h) {
  const luma = new Float32Array(w * h);
  for (let i = 0; i < w*h; i++)
    luma[i] = 0.299*pixels[i*4] + 0.587*pixels[i*4+1] + 0.114*pixels[i*4+2];
  const bx = Math.floor(w/8), by = Math.floor(h/8);
  const bits = [];
  for (let blky = 0; blky < by; blky++) {
    for (let blkx = 0; blkx < bx; blkx++) {
      const block = Array.from({length:8}, (_,r) =>
        Float32Array.from({length:8}, (_,c) => luma[(blky*8+r)*w + blkx*8+c] - 128));
      const tmp = block.map(row => dct8(row));
      for (const [r,c] of EPOS) {
        const col = new Float32Array(8);
        for (let i = 0; i < 8; i++) col[i] = tmp[i][c];
        const dc = dct8(col);
        bits.push(Math.round(dc[r] / STEP) & 1);
      }
    }
  }
  // decode frame header
  if (bits.length < 16) return null;
  let len = 0;
  for (let i = 0; i < 16; i++) len = (len << 1) | bits[i];
  if (len <= 0 || bits.length < (2 + len) * 8) return null;
  const data = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    let b = 0;
    for (let j = 0; j < 8; j++) b = (b << 1) | bits[16 + i*8 + j];
    data[i] = b;
  }
  return data;
}

// === WG tunnel state ===
let wasm = null, mem = null, tunnelReady = false;

// Minimal WASI stubs
function wasiStubs(memory) {
  return {
    random_get(buf, len) { crypto.getRandomValues(new Uint8Array(memory.buffer, buf, len)); return 0; },
    environ_get() { return 0; },
    environ_sizes_get(cp, sp) { new DataView(memory.buffer).setUint32(cp,0,true); new DataView(memory.buffer).setUint32(sp,0,true); return 0; },
    clock_time_get(id, p, tp) { new DataView(memory.buffer).setBigUint64(tp, BigInt(Math.floor(performance.now()*1e6)), true); return 0; },
    fd_write(fd, iovs, n, np) { new DataView(memory.buffer).setUint32(np, 0, true); return 0; },
    proc_exit() {},
    sched_yield() { return 0; },
  };
}

async function loadWasm() {
  msg('loading boringtun_wasm.wasm...');
  const resp = await fetch('boringtun_wasm.wasm');
  const mod = await WebAssembly.compile(await resp.arrayBuffer());
  const inst = await WebAssembly.instantiate(mod, {
    wasi_snapshot_preview1: wasiStubs(new WebAssembly.Memory({initial:256})),
  });
  wasm = inst.exports;
  mem = wasm.memory;
  msg('wasm loaded', 'ok');
}

window.genKeys = () => {
  // generate random x25519 keypair via wasm (or placeholder)
  const priv = new Uint8Array(32);
  crypto.getRandomValues(priv);
  // clamp for x25519
  priv[0] &= 248; priv[31] &= 127; priv[31] |= 64;
  $('privkey').value = btoa(String.fromCharCode(...priv));
  msg('keypair generated (paste peer pubkey to connect)');
};

window.initTunnel = async () => {
  if (!wasm) await loadWasm();
  const privB64 = $('privkey').value.trim();
  const pubB64 = $('pubkey').value.trim();
  if (!privB64 || !pubB64) { msg('need both keys', 'err'); return; }
  const priv = Uint8Array.from(atob(privB64), c => c.charCodeAt(0));
  const pub_ = Uint8Array.from(atob(pubB64), c => c.charCodeAt(0));
  const pp = wasm.wg_alloc(32), kp = wasm.wg_alloc(32);
  new Uint8Array(mem.buffer, pp, 32).set(priv);
  new Uint8Array(mem.buffer, kp, 32).set(pub_);
  const rc = wasm.wg_init(pp, kp, 0, 25, 1);
  wasm.wg_free(pp, 32); wasm.wg_free(kp, 32);
  if (rc !== 0) { msg('wg_init failed', 'err'); return; }
  tunnelReady = true;
  msg('tunnel initialized', 'ok');
};

function getCanvasPixels() {
  const c = $('canvas'), ctx = c.getContext('2d');
  return { ctx, w: c.width, h: c.height, data: ctx.getImageData(0, 0, c.width, c.height) };
}

function drawCatToCanvas() {
  const c = $('canvas'), cat = $('cat');
  const w = cat.naturalWidth || 256, h = cat.naturalHeight || 256;
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(cat, 0, 0, w, h);
  // meme text
  const top = ($('meme-top').value || '').toUpperCase();
  const bot = ($('meme-bot').value || '').toUpperCase();
  const sz = Math.max(16, Math.floor(w / 12));
  ctx.font = `bold ${sz}px Impact, sans-serif`;
  ctx.textAlign = 'center';
  ctx.lineWidth = Math.max(2, sz/8);
  ctx.strokeStyle = '#000'; ctx.fillStyle = '#fff';
  if (top) { ctx.strokeText(top, w/2, sz+8); ctx.fillText(top, w/2, sz+8); }
  if (bot) { ctx.strokeText(bot, w/2, h-12); ctx.fillText(bot, w/2, h-12); }
}

function embedInMeme(rawBytes) {
  drawCatToCanvas();
  const {ctx, w, h, data} = getCanvasPixels();
  const stego = imgStegoEncode(rawBytes, data.data, w, h);
  const img = new ImageData(new Uint8ClampedArray(stego), w, h);
  ctx.putImageData(img, 0, 0);
  msg(`embedded ${rawBytes.length}B in ${w}×${h} cat meme`, 'ok');
}

window.doHandshake = () => {
  if (!tunnelReady) { msg('init tunnel first', 'err'); return; }
  const dst = wasm.wg_alloc(65536), op = wasm.wg_alloc(4);
  const n = wasm.wg_tick(dst, 65536, op);
  const o = new Int32Array(mem.buffer, op, 1)[0];
  if (o === 1 && n > 0) {
    const pkt = new Uint8Array(mem.buffer, dst, n).slice();
    embedInMeme(pkt);
    msg(`handshake init: ${n}B → cat meme`);
  } else {
    msg('no handshake to send (try again or check state)', 'info');
  }
  wasm.wg_free(dst, 65536); wasm.wg_free(op, 4);
};

window.doSend = () => {
  if (!tunnelReady) { msg('init tunnel first', 'err'); return; }
  const text = prompt('message to send:');
  if (!text) return;
  const pkt = new TextEncoder().encode(text.padEnd(28, '\0'));
  const dst = wasm.wg_alloc(65536), op = wasm.wg_alloc(4);
  const src = wasm.wg_alloc(pkt.length);
  new Uint8Array(mem.buffer, src, pkt.length).set(pkt);
  const n = wasm.wg_write(src, pkt.length, dst, 65536, op);
  const o = new Int32Array(mem.buffer, op, 1)[0];
  if (o === 1 && n > 0) {
    embedInMeme(new Uint8Array(mem.buffer, dst, n).slice());
    msg(`encrypted ${text.length}B → cat meme`);
  } else {
    msg('encrypt failed', 'err');
  }
  wasm.wg_free(src, pkt.length); wasm.wg_free(dst, 65536); wasm.wg_free(op, 4);
};

window.doReceive = () => {
  if (!tunnelReady) { msg('init tunnel first', 'err'); return; }
  const {w, h, data} = getCanvasPixels();
  const extracted = imgStegoDecode(data.data, w, h);
  if (!extracted) { msg('no stego data found in image', 'err'); return; }
  msg(`extracted ${extracted.length}B from image`);
  const src = wasm.wg_alloc(extracted.length);
  const dst = wasm.wg_alloc(65536), op = wasm.wg_alloc(4);
  new Uint8Array(mem.buffer, src, extracted.length).set(extracted);
  const n = wasm.wg_read(src, extracted.length, dst, 65536, op);
  const o = new Int32Array(mem.buffer, op, 1)[0];
  if (o === 1 && n > 0) {
    const resp = new Uint8Array(mem.buffer, dst, n).slice();
    msg(`handshake response: ${n}B — embedding in new meme`);
    embedInMeme(resp);
  } else if ((o === 4 || o === 6) && n > 0) {
    const pkt = new Uint8Array(mem.buffer, dst, n);
    msg(`decrypted: ${new TextDecoder().decode(pkt).replace(/\0/g,'')}`, 'ok');
  } else if (n < 0) {
    msg('decrypt error', 'err');
  } else {
    msg('processed (done)', 'info');
  }
  wasm.wg_free(src, extracted.length); wasm.wg_free(dst, 65536); wasm.wg_free(op, 4);
};

window.doDownload = () => {
  const url = $('canvas').toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'stego-cat.png'; a.click();
};

window.newCat = () => {
  $('cat').src = `https://placekitten.com/${256+Math.floor(Math.random()*20)}/${256+Math.floor(Math.random()*20)}`;
};

window.loadImg = (input) => {
  const file = input.files[0]; if (!file) return;
  const img = new Image();
  img.onload = () => {
    const c = $('canvas');
    c.width = img.width; c.height = img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    msg(`loaded ${img.width}×${img.height} image`);
  };
  img.src = URL.createObjectURL(file);
};

window.pasteToCanvas = () => {
  const text = $('paste-box').value;
  if (text.startsWith('data:image')) {
    const img = new Image();
    img.onload = () => {
      const c = $('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      msg('loaded image from paste');
    };
    img.src = text;
  } else if (text.includes('\u200B')) {
    const data = zwDecode(text);
    msg(`decoded ${data.length}B from zero-width stego`);
    embedInMeme(data);
  } else {
    msg('paste an image data URL or zero-width stego text', 'err');
  }
};

window.canvasToPaste = () => {
  const url = $('canvas').toDataURL('image/png');
  $('paste-box').value = url;
  navigator.clipboard?.writeText(url);
  msg('canvas → clipboard as data URL');
};

window.postToPastebin = async () => {
  const url = $('paste-url').value.trim();
  if (!url) { msg('set pastebin URL first', 'err'); return; }
  const dataUrl = $('canvas').toDataURL('image/png');
  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: dataUrl, title: 'stego-cat-' + Date.now()}),
    });
    const j = await resp.json().catch(() => ({}));
    msg(`posted to pastebin: ${j.id || j.url || resp.status}`, 'ok');
  } catch(e) { msg('post failed: ' + e, 'err'); }
};

// clipboard paste support
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const img = new Image();
      img.onload = () => {
        const c = $('canvas');
        c.width = img.width; c.height = img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        msg(`pasted ${img.width}×${img.height} image from clipboard`);
      };
      img.src = URL.createObjectURL(item.getAsFile());
      e.preventDefault();
      return;
    }
  }
});

msg('🐱 kagenti stego tunnel ready');
msg('generate keys, init tunnel, then hide WG packets in cat memes');
</script>
</body></html>
